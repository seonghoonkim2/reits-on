name: Build data + REIT pages

on:
  schedule:
    - cron: '20 21 * * *'     # 매일 06:20 KST (21:20 UTC) — 야간 집계·안전망
    - cron: '30 7 * * 1-5'    # 평일 16:30 KST (07:30 UTC) — KRX 장 마감(15:30) 후 종가 수집
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['data/**', 'schema/**', 'scripts/**', 'index.html']

permissions:
  contents: write

concurrency:
  group: build-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch latest market data (API → data/*.json)
        env:
          API_BASE: ${{ vars.API_BASE || 'https://reits-on-api.modelter.workers.dev' }}
        run: node scripts/fetch-data.mjs
        continue-on-error: true   # 외부 API 일시 장애가 일일 빌드를 막지 않도록
      - name: Unit tests (finance + 시세 수집)
        run: node --test tests/*.test.mjs
      - name: Validate data (provenance·도메인 규칙)
        run: node scripts/validate.mjs
      - name: Detect changes (변화감지 → data/changes.json)
        run: node scripts/build-changes.mjs
      - name: Embed seed (data/*.json → index.html)
        run: node scripts/embed-seed.mjs
      - name: Inject finance module (finance.mjs → index.html)
        run: node scripts/build-app.mjs
      - name: Generate per-REIT pages + sitemap
        run: node scripts/build-pages.mjs
      - name: Generate filings RSS (공시 피드)
        run: node scripts/build-filings.mjs
      - name: Generate dividend calendar (.ics 구독 피드)
        run: node scripts/build-ics.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            git commit -m "chore: 시세·데이터 자동 갱신 + 종목 페이지 재생성 (CI) [skip ci]"
            git push
          fi
