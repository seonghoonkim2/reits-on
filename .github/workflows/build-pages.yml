name: Build data + REIT pages

on:
  schedule:
    - cron: '20 21 * * *'   # 매일 06:20 KST (21:20 UTC)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['data/**', 'schema/**', 'scripts/**', 'index.html']

permissions:
  contents: write

concurrency:
  group: build-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate data (provenance·도메인 규칙)
        run: node scripts/validate.mjs
      - name: Embed seed (data/*.json → index.html)
        run: node scripts/embed-seed.mjs
      - name: Generate per-REIT pages + sitemap
        run: node scripts/build-pages.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            git commit -m "chore: 데이터 검증·임베드·종목 페이지 재생성 (CI)"
            git push
          fi
